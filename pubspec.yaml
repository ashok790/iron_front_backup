name: iron_front
description: "Iron Front: Last Defense - Military Tower Defense Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Game engine
  flame: ^1.18.0
  flame_audio: ^2.10.0

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.2

  # Backend (Supabase)
  supabase_flutter: ^2.5.1

  # Local storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  google_sign_in: ^6.2.1

  # Monetization
  google_mobile_ads: ^5.1.0       # AdMob
  in_app_purchase: ^3.2.0          # Google Play Billing (subscriptions + IAP)

  # Firebase (analytics + crash reporting + push)
  firebase_core: ^3.1.0
  firebase_analytics: ^11.0.1
  firebase_crashlytics: ^4.0.1
  firebase_messaging: ^15.0.1

  # Utilities
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.1.2
  audioplayers: ^6.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
